[pytest]
minversion = 8.0

testpaths = tests
pythonpath = .

python_files = test_*.py
python_classes = Test*
python_functions = test_*

asyncio_mode = auto

markers =
    live: tests that make real HTTP calls to HCFL (gated by ENABLE_LIVE_TESTS=1)
    slow: tests that take >5s; excluded from default fast loop
    integration: tests requiring DB or multiple services
    e2e: full-pipeline tests that exercise the whole system

addopts =
    --strict-markers
    --strict-config
    -ra
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=0

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
